name: MFlix Hybrid Sender

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Google Drive or VOE File ID'
        required: true
      user_jid:
        description: 'WhatsApp User JID'
        required: true

# --- පෝලිම් පද්ධතිය (Queue System) ආරම්භය ---
concurrency:
  group: mflix-sender-group
  cancel-in-progress: false 
# ------------------------------------------

jobs:
  send_video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests gdown
          npm install @whiskeysockets/baileys pino axios

      - name: Run MFlix Engine
        env:
          SESSION_ID: ${{ secrets.SESSION_ID }}
          VOE_KEY: ${{ secrets.VOE_KEY }}
          FILE_ID: ${{ github.event.inputs.file_id }}
          USER_JID: ${{ github.event.inputs.user_jid }}
        run: node send.js
